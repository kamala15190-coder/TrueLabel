name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

# Nie zwei Deploys gleichzeitig auf denselben Server
concurrency:
  group: truelabel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy über SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$SSH_KEY" ]; then
            echo "::notice::Hetzner-Secrets fehlen — Deploy übersprungen. (Siehe TODO.md Schritt 7)"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$USER@$HOST" 'bash -s' < scripts/deploy.sh
